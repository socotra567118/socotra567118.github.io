<head>
    <link rel="stylesheet" href="../assets/css/decimal_changer_css.css"/>

<h2>2진수, 8진수, 10진수, 16진수 변환기</h2>
<body>
    <p>
        <div>
            <select id="from_value" >
                <option value="0">2진수</option>
                <option value="1">8진수</option>
                <option value="2" selected>10진수</option>
                <option value="3">16진수</option>
            </select>
            에서 
            <select id="to_value">
                <option value="0">2진수</option>
                <option value="1">8진수</option>
                <option value="2">10진수</option>
                <option value="3" selected>16진수</option>
            </select>
            로
        </div>
    </p>
    <textarea class="decimal_changer" type="text" id="from" value="" placeholder="입력"></textarea>
    <br>
    <br>
    <textarea class="decimal_changer" type="text" id="to" value="" placeholder="결과" readonly></textarea>
    <br>
    <input class="submit_button" type="button" id="clear" value="지우기">
    <input class="submit_button" type="button" id="copy" value="복사하기">
    <input class="submit_button" type="button" id="change" value="바꾸기">

    <script src="../assets/js/two_eight_ten_sixteen.js"></script>
</body>
